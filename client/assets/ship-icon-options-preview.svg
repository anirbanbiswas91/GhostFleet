<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 790" role="img" aria-labelledby="title desc">
  <title id="title">GhostFleet ship icon style options</title>
  <desc id="desc">Five visual style options for Carrier, Battleship, Cruiser, Submarine, and Destroyer icons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".55" stop-color="#06202b"/>
      <stop offset="1" stop-color="#07111d"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-35%" width="150%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#67e8f9" flood-opacity=".35"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity=".75"/>
    </filter>
    <filter id="goldGlow" x="-25%" y="-35%" width="150%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#facc15" flood-opacity=".38"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity=".7"/>
    </filter>
    <style>
      .bg{fill:url(#bg);}
      .title{fill:#e2b96f;font:900 30px Arial,sans-serif;letter-spacing:2px;}
      .subtitle{fill:#cbd5e1;font:700 14px Arial,sans-serif;letter-spacing:.5px;}
      .row-title{fill:#f8fafc;font:900 16px Arial,sans-serif;letter-spacing:1px;}
      .row-sub{fill:#94a3b8;font:700 11px Arial,sans-serif;}
      .col-title{fill:#7dd3fc;font:900 13px Arial,sans-serif;letter-spacing:1px;text-anchor:middle;}
      .cell-label{fill:#e2b96f;font:800 10px Arial,sans-serif;text-anchor:middle;letter-spacing:.6px;}
      .slot{fill:rgba(15,23,42,.68);stroke:rgba(125,211,252,.26);stroke-width:1.4;}
      .guide{stroke:rgba(226,185,111,.20);stroke-width:1;stroke-dasharray:4 5;}
      .ship{fill:var(--fill);stroke:var(--stroke);stroke-width:2.4;filter:url(#softGlow);}
      .deck{stroke:#ecfeff;stroke-width:2.2;stroke-linecap:round;opacity:.72;}
      .dark{fill:#07111d;}
      .light{fill:#f8fafc;}
      .spark{fill:#facc15;}
      .wake{fill:none;stroke:#bfdbfe;stroke-width:2;stroke-linecap:round;opacity:.48;}
      .ghost{fill:#e0f2fe;opacity:.55;}
      .crest{filter:url(#goldGlow);}
    </style>
  </defs>

  <rect class="bg" width="1280" height="790"/>
  <text class="title" x="40" y="48">GHOSTFLEET SHIP ICON OPTIONS</text>
  <text class="subtitle" x="40" y="75">Preview only: each mark is drawn as a long strip intended to fill most of the occupied cells when sliced across the board.</text>

  <g transform="translate(250 104)">
    <text class="col-title" x="95" y="0">CARRIER</text>
    <text class="col-title" x="290" y="0">BATTLESHIP</text>
    <text class="col-title" x="485" y="0">CRUISER</text>
    <text class="col-title" x="680" y="0">SUBMARINE</text>
    <text class="col-title" x="875" y="0">DESTROYER</text>
  </g>

